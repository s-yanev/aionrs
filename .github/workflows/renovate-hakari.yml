name: Renovate Hakari

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  renovate-hakari:
    name: Regenerate Hakari
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      (
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'app/renovate'
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure latest main
        run: git pull --ff-only origin main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0

      - name: Install cargo-hakari
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hakari

      - name: Regenerate
        run: |
          cargo hakari generate
          cargo hakari manage-deps --yes

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml workspace-hack/Cargo.toml
          git commit -m "chore(deps): regenerate hakari after renovate merge"
          git push origin HEAD:main
