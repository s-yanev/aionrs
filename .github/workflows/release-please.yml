# Release Please workflow
# Runs on push to main to create/update release PRs.
# When a release PR is merged, creates a GitHub Release + tag,
# then calls the Release workflow to build and upload assets.
#
# Design: Two-job approach (mirrors loonghao/vx) to avoid duplicate-PR bug.
#
# Job 1 "release" — runs ONLY on release commits ("chore: release vX.Y.Z"):
#   Creates the tag + GitHub Release. Uses skip-github-pull-request to
#   prevent creating a new PR on the same run.
#   Then calls release.yml via workflow_call to build and upload binaries.
#
# Job 2 "update-pr" — runs on EVERY OTHER commit:
#   Creates/updates the release PR. Skipped on release commits to avoid
#   the duplicate PR problem (googleapis/release-please#713).
#   After release-please updates Cargo.toml, refreshes Cargo.lock on the
#   release PR branch because this workspace uses version.workspace = true.

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  # ─── Job 1: Tag + GitHub Release (release commits only) ───────────────────
  release:
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: release') || startsWith(github.event.head_commit.message, 'chore(main): release')"
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Trigger Release build workflow
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Release created: ${{ steps.release.outputs.tag_name }}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --field "tag_name=${{ steps.release.outputs.tag_name }}"

  # ─── Job 2: Create/update release PR (non-release commits) ────────────────
  update-pr:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release') && !startsWith(github.event.head_commit.message, 'chore(main): release')"
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        id: release-pr
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          branch="$(jq -r '.headBranchName' <<<"${RELEASE_PR}")"
          if [[ -z "${branch}" || "${branch}" == "null" ]]; then
            echo "release-please did not expose a PR branch" >&2
            exit 1
          fi
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release-pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Cargo.lock versions
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: cargo update --workspace

      - name: Commit Cargo.lock if changed
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already matches Cargo.toml"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock for release"
          git push origin HEAD:${{ steps.release-pr.outputs.branch }}
